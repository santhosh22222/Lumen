# Render blueprint — deploy backend and frontend in one go.
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: lumen-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: openai/gpt-oss-120b
      - key: TAVILY_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false # set to your deployed frontend URL

  - type: web
    name: lumen-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://lumen-backend.onrender.com/api/*
      - type: rewrite
        source: /auth/*
        destination: https://lumen-backend.onrender.com/auth/*
      - type: rewrite
        source: /trackify/*
        destination: https://lumen-backend.onrender.com/trackify/*
      - type: rewrite
        source: /*
        destination: /index.html
